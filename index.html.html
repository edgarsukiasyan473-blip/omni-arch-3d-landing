  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Arch</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glow {
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.7);
    }
  </style>
</head>
<body class="text-white font-sans">

  <!-- 3D Background -->
  <div id="canvas-container"></div>

  <!-- Content -->
  <div class="relative z-10 min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="flex justify-between items-center px-10 py-6">
      <h1 class="text-2xl font-bold tracking-widest glow">OMNI ARCH</h1>
      <nav class="space-x-8 text-sm uppercase tracking-wider">
        <a href="#" class="hover:text-indigo-400 transition">Home</a>
        <a href="#" class="hover:text-indigo-400 transition">Work</a>
        <a href="#" class="hover:text-indigo-400 transition">About</a>
        <a href="#" class="hover:text-indigo-400 transition">Contact</a>
      </nav>
    </header>

    <!-- Hero -->
    <main class="flex-1 flex items-center justify-center text-center px-6">
      <div class="glass rounded-2xl p-12 max-w-3xl shadow-2xl">
        <h2 class="text-5xl md:text-6xl font-extrabold mb-6 glow">
          Design Beyond Dimensions
        </h2>
        <p class="text-gray-300 mb-8 leading-relaxed">
          Omni Arch merges architecture, AI, and immersive 3D experiences into one seamless digital reality.
        </p>
        <button class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-full transition shadow-lg shadow-indigo-900/40">
          Enter Experience
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-500 py-6 text-sm">
      © 2026 Omni Arch — Future Interfaces
    </footer>

  </div>

  <!-- Three.js Script -->
  <script>
    const container = document.getElementById("canvas-container");

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Geometry: Torus Knot (futuristic core)
    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 150, 20);

    const material = new THREE.MeshStandardMaterial({
      color: 0x6366f1,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x1e1b4b,
    });

    const knot = new THREE.Mesh(geometry, material);
    scene.add(knot);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0x6366f1, 2);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    camera.position.z = 4;

    // Particles
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1000;

    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 20;
    }

    particlesGeometry.setAttribute(
      "position",
      new THREE.BufferAttribute(posArray, 3)
    );

    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.02,
      color: 0x818cf8,
    });

    const particlesMesh = new THREE.Points(
      particlesGeometry,
      particlesMaterial
    );

    scene.add(particlesMesh);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      knot.rotation.x += 0.003;
      knot.rotation.y += 0.005;

      particlesMesh.rotation.y += 0.0005;

      renderer.render(scene, camera);
    }

    animate();

    // Resize handling
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
    
  </body>
  
</html>
